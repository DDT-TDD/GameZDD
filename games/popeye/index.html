<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Sailor Quest - GameZDD</title><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:'Segoe UI';background:linear-gradient(135deg,#1E90FF 0%,#00CED1 100%);min-height:100vh;padding:15px}.game-container{background:linear-gradient(145deg,#ffffff 0%,#f5f7fa 100%);border-radius:25px;padding:30px;box-shadow:0 25px 70px rgba(0,0,0,0.4);display:flex;gap:40px;width:100%;max-width:1600px;margin:0 auto}.game-main{display:flex;flex-direction:column;align-items:center;flex:1 1 55%;gap:20px}.game-title{font-size:36px;background:linear-gradient(135deg,#1E90FF 0%,#00CED1 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;font-weight:bold}#gameCanvas{border:5px solid;border-radius:15px;background:linear-gradient(145deg,#1a1a2e 0%,#0a0a0a 100%);box-shadow:0 15px 40px rgba(0,0,0,0.5)}.game-sidebar{display:grid;grid-template-columns:repeat(2,1fr);gap:20px;flex:1 1 45%;max-width:760px}.info-panel{background:linear-gradient(135deg,#1E90FF 0%,#00CED1 100%);padding:18px;border-radius:18px;color:white}.info-panel h3{font-size:20px;margin-bottom:12px;text-align:center}.stat-value{font-size:36px;text-align:center;font-weight:bold}.btn{padding:15px;font-size:16px;font-weight:bold;border:none;border-radius:12px;cursor:pointer;transition:all 0.3s}.btn-primary{background:linear-gradient(135deg,#1E90FF 0%,#00CED1 100%);color:white}.btn-secondary{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:white}.btn-group{display:flex;flex-wrap:wrap;gap:12px;grid-column:1/-1}.btn-group .btn{flex:1 1 calc(50% - 12px)}.controls-panel{background:#f8f9fa;padding:18px;border-radius:18px}.control-item{display:flex;justify-content:space-between;padding:10px;background:white;border-radius:10px;margin:10px 0}.span-2{grid-column:1/-1}input[type="range"]{width:100%;margin-top:10px}@media(max-width:1200px){.game-container{flex-direction:column}.btn-group .btn{flex:1 1 100%}}</style></head><body><div class="game-container"><div class="game-main"><h1 class="game-title">⚓ Sailor Quest</h1><canvas id="gameCanvas" width="640" height="480"></canvas></div><div class="game-sidebar"><div class="info-panel"><h3>🎯 Score</h3><div class="stat-value" id="score">0</div></div><div class="info-panel"><h3>❤️ Lives</h3><div class="stat-value" id="lives">3</div></div><div class="info-panel span-2"><h3>📊 Level</h3><div class="stat-value" id="level">1</div></div><div class="info-panel span-2"><h3>⚡ Speed</h3><div style="display:flex;justify-content:space-between;padding:10px;background:rgba(255,255,255,0.15)"><span>Speed:</span><span style="font-weight:bold" id="speedValue">1.0x</span></div><input type="range" id="speedSlider" min="0.5" max="2" step="0.1" value="1"></div><div class="btn-group"><button class="btn btn-primary" id="startBtn">🎮 Start</button><button class="btn btn-secondary" id="backBtn">🏠 Back</button><button class="btn btn-secondary" id="fullscreenBtn">🖥️ Fullscreen</button></div><div class="controls-panel span-2"><h3>🎮 Controls</h3><div class="control-item"><span>Move</span><span style="background:linear-gradient(135deg,#1E90FF 0%,#00CED1 100%);color:white;padding:6px 12px">← → ↑ ↓</span></div></div></div></div><script src="../../engine/gameEngine.js"></script><script src="../../engine/audioManager.js"></script><script src="../../engine/inputHandler.js"></script><script src="../../engine/saveManager.js"></script><script src="game.js"></script></body></html>
