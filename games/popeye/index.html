<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Sailor Quest — GameZDD</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@600;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Rajdhani','Segoe UI',sans-serif;background:linear-gradient(135deg,#0a1a3a 0%,#0a2a5a 100%);min-height:100vh;padding:15px;color:#fff}
.game-container{background:rgba(10,20,50,0.92);border:2px solid rgba(30,144,255,0.3);border-radius:20px;padding:24px;box-shadow:0 20px 60px rgba(0,0,0,0.6);display:flex;gap:30px;width:100%;max-width:1400px;margin:0 auto}
.game-main{display:flex;flex-direction:column;align-items:center;flex:1 1 55%;gap:16px}
.game-title{font-family:'Orbitron',monospace;font-size:1.5rem;background:linear-gradient(135deg,#1E90FF,#00CED1);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;font-weight:900;letter-spacing:3px;filter:drop-shadow(0 0 12px rgba(30,144,255,0.7))}
#gameCanvas{border:3px solid rgba(30,144,255,0.5);border-radius:12px;box-shadow:0 12px 40px rgba(0,0,0,0.7),0 0 20px rgba(30,144,255,0.2)}
.game-sidebar{display:grid;grid-template-columns:repeat(2,1fr);gap:16px;flex:1 1 42%;max-width:700px}
.info-panel{background:rgba(30,144,255,0.12);border:2px solid rgba(30,144,255,0.3);padding:16px;border-radius:14px;color:white}
.info-panel h3{font-family:'Orbitron',monospace;font-size:0.75rem;margin-bottom:10px;text-align:center;color:#00CED1;letter-spacing:2px;text-transform:uppercase}
.stat-value{font-family:'Orbitron',monospace;font-size:1.8rem;text-align:center;font-weight:900;color:#fff;text-shadow:0 0 10px rgba(30,144,255,0.8)}
.stat-value.small{font-size:1.1rem}
.btn{padding:13px;font-size:0.85rem;font-weight:700;border:none;border-radius:10px;cursor:pointer;transition:all 0.25s;font-family:'Rajdhani','Segoe UI',sans-serif;letter-spacing:1px;text-transform:uppercase}
.btn-primary{background:linear-gradient(135deg,#1E90FF,#00CED1);color:white;border:2px solid rgba(0,206,209,0.4)}
.btn-secondary{background:rgba(180,79,255,0.15);color:#b44fff;border:2px solid rgba(180,79,255,0.4)}
.btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(30,144,255,0.4)}
.btn-group{display:flex;flex-wrap:wrap;gap:10px;grid-column:1/-1}
.btn-group .btn{flex:1 1 calc(50% - 10px)}
.controls-panel{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);padding:16px;border-radius:14px;grid-column:1/-1}
.controls-panel h3{font-family:'Orbitron',monospace;font-size:0.72rem;color:#b44fff;letter-spacing:2px;text-transform:uppercase;margin-bottom:10px}
.control-item{display:flex;justify-content:space-between;padding:8px 10px;background:rgba(255,255,255,0.04);border-radius:8px;margin:6px 0;font-size:0.88rem;color:#a0a8c0}
.control-item span:last-child{background:linear-gradient(135deg,#1E90FF,#00CED1);color:white;padding:4px 10px;border-radius:6px;font-weight:700;font-size:0.8rem}
.span-2{grid-column:1/-1}
input[type="range"]{width:100%;margin-top:8px;accent-color:#1E90FF}
@media(max-width:1100px){.game-container{flex-direction:column}.btn-group .btn{flex:1 1 100%}}
</style>
</head>
<body>
<div class="game-container">
  <div class="game-main">
    <h1 class="game-title">⚓ SAILOR QUEST</h1>
    <canvas id="gameCanvas" width="640" height="480"></canvas>
  </div>
  <div class="game-sidebar">
    <div class="info-panel"><h3>🎯 Score</h3><div class="stat-value" id="score">0</div></div>
    <div class="info-panel"><h3>❤️ Lives</h3><div class="stat-value" id="lives">❤️❤️❤️</div></div>
    <div class="info-panel span-2"><h3>📊 Level</h3><div class="stat-value small" id="level">1 / 6</div><div style="text-align:center;color:#00CED1;font-size:0.9rem;margin-top:6px;font-weight:700" id="missionName"></div></div>
    <div class="info-panel span-2">
      <h3>🫒 Olives Left</h3>
      <div class="stat-value" id="olivesLeft">–</div>
    </div>
    <div class="info-panel span-2">
      <h3>⚡ Speed</h3>
      <div style="display:flex;justify-content:space-between;padding:8px;background:rgba(255,255,255,0.06);border-radius:8px">
        <span>Speed:</span><span style="font-weight:700;color:#00CED1" id="speedValue">1.0x</span>
      </div>
      <input type="range" id="speedSlider" min="0.5" max="2" step="0.1" value="1">
    </div>
    <div class="btn-group">
      <button class="btn btn-primary" id="startBtn">▶ START</button>
      <button class="btn btn-secondary" id="backBtn">🏠 MENU</button>
      <button class="btn btn-secondary" id="fullscreenBtn">🖥️ Fullscreen</button>
    </div>
    <div class="controls-panel">
      <h3>🎮 Controls</h3>
      <div class="control-item"><span>Move Left/Right</span><span>← → / A D</span></div>
      <div class="control-item"><span>Jump</span><span>↑ / W / Space</span></div>
    </div>
  </div>
</div>
<script src="../../engine/audioManager.js"></script>
<script src="../../engine/inputHandler.js"></script>
<script src="../../engine/saveManager.js"></script>
<script src="game.js"></script>
</body>
</html>
