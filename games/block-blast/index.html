<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gem Match - GameZDD</title>
    <style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@600;700&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Rajdhani','Segoe UI',sans-serif; background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 100%); min-height: 100vh; padding: 15px;   color: #fff;
}
        .game-container { background:rgba(10,10,20,0.92); border-radius: 25px; padding: 30px; box-shadow: 0 25px 70px rgba(0, 0, 0, 0.4); display: flex; gap: 40px; width: 100%; max-width: 1600px; margin: 0 auto; border: 3px solid rgba(255, 255, 255, 0.3); }
        .game-main { display: flex; flex-direction: column; align-items: center; flex: 1 1 55%; gap: 20px; }
        .game-title { font-size: 36px;
            font-family: 'Orbitron', monospace; background: linear-gradient(135deg, #00D4FF 0%, #0099CC 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; text-align: center; margin-bottom: 10px; font-weight: bold; }
        #gameCanvas { border: 5px solid transparent; border-radius: 15px; background: linear-gradient(145deg, #1a1a2e 0%, #0a0a0a 100%); box-shadow: 0 15px 40px rgba(0, 0, 0, 0.5); border-image: linear-gradient(135deg, #00D4FF, #0099CC) 1; }
        .game-sidebar { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; flex: 1 1 45%; max-width: 760px; }
        .info-panel { background: linear-gradient(135deg, #00D4FF 0%, #0099CC 100%); padding: 18px; border-radius: 18px; color: white; box-shadow: 0 8px 25px rgba(0, 212, 255, 0.4); border: 2px solid rgba(255, 255, 255, 0.2); }
        .info-panel h3 { font-size: 20px; margin-bottom: 12px; text-align: center; text-transform: uppercase; }
        .stat-value { font-size: 36px; text-align: center; font-weight: bold; }
        .stat-label { text-align: center; font-size: 14px; opacity: 0.85; }
        .controls-panel { background:rgba(255,255,255,0.05); padding: 18px; border-radius: 18px; box-shadow: 0 5px 20px rgba(0, 0, 0, 0.15); border: 2px solid rgba(0, 212, 255, 0.2); }
        .control-item { display: flex; justify-content: space-between; padding: 10px; background:rgba(255,255,255,0.07); border-radius: 10px; margin: 10px 0; font-size: 15px; }
        .control-key { background: linear-gradient(135deg, #00D4FF 0%, #0099CC 100%); color: white; padding: 6px 12px; border-radius: 8px; font-weight: bold; font-size: 13px; }
        .span-2 { grid-column: 1 / -1; }
        .btn { padding: 15px; font-size: 16px; font-weight: bold; border: none; border-radius: 12px; cursor: pointer; transition: all 0.3s; box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2); }
        .btn-primary { background: linear-gradient(135deg, #00D4FF 0%, #0099CC 100%); color: white; }
        .btn-primary:hover { transform: translateY(-3px) scale(1.02); }
        .btn-secondary { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; }
        .btn-group { display: flex; flex-wrap: wrap; gap: 12px; grid-column: 1 / -1; }
        .btn-group .btn { flex: 1 1 calc(50% - 12px); min-width: 200px; }
        input[type="range"] { width: 100%; height: 8px; border-radius: 5px; margin-top: 10px; }
        .speed-display { display: flex; justify-content: space-between; padding: 10px; background: rgba(255, 255, 255, 0.15); border-radius: 12px; margin-bottom: 10px; }
        .speed-value { font-size: 22px; font-weight: bold; }
        @media (max-width: 1200px) { .game-container { flex-direction: column; } .game-sidebar { width: 100%; max-width: 640px; grid-template-columns: 1fr; } .btn-group .btn { flex: 1 1 100%; } }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="game-main">
            <h1 class="game-title">💎 Gem Match</h1>
            <canvas id="gameCanvas" width="640" height="640"></canvas>
        </div>
        <div class="game-sidebar">
            <div class="info-panel"><h3>🎯 Score</h3><div class="stat-value" id="score">0</div><div class="stat-label">Points</div></div>
            <div class="info-panel"><h3>⚡ Combos</h3><div class="stat-value" id="combos">0</div><div class="stat-label">Chain count</div></div>
            <div class="info-panel span-2"><h3>📊 Level</h3><div class="stat-value" id="level">1</div><div class="stat-label">Challenge</div></div>
            <div class="info-panel span-2"><h3>⚡ Speed Control</h3><div class="speed-display"><span>Game Speed:</span><span class="speed-value" id="speedValue">1.0x</span></div><input type="range" id="speedSlider" min="0.5" max="2" step="0.1" value="1"></div>
            <div class="btn-group">
                <button class="btn btn-primary" id="startBtn">🎮 Start Game</button>
                <button class="btn btn-secondary" id="backBtn">🏠 Back</button>
                <button class="btn btn-secondary" id="fullscreenBtn">🖥️ Fullscreen</button>
            </div>
            <div class="controls-panel span-2">
                <h3>🎮 Controls</h3>
                <div class="control-item"><span>Select Block</span><span style="opacity: 0.7; font-style: italic;">Click on blocks</span></div>
                <div class="control-item"><span>Match 3+</span><span style="opacity: 0.7; font-style: italic;">Auto-clears connected</span></div>
            </div>
        </div>
    </div>
    <script src="../../engine/audioManager.js"></script>
    <script src="../../engine/inputHandler.js"></script>
    <script src="../../engine/saveManager.js"></script>
    <script src="game.js"></script>
</body>
</html>
