<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marble Chain - GameZDD</title>
    <style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:'Segoe UI',sans-serif;background:linear-gradient(135deg,#0a0a0a 0%,#1a1a2e 100%);color:#fff;min-height:100vh;padding:15px}.game-container{background:rgba(10,10,20,0.92);border-radius:25px;padding:30px;box-shadow:0 25px 70px rgba(0,0,0,0.4);display:flex;gap:40px;width:100%;max-width:1600px;margin:0 auto;border:3px solid rgba(255,255,255,0.3)}.game-main{display:flex;flex-direction:column;align-items:center;flex:1 1 55%;gap:20px}.game-title{font-size:36px;background:linear-gradient(135deg,#FF1654 0%,#FF6B35 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;font-weight:bold}#gameCanvas{border:5px solid;border-radius:15px;background:linear-gradient(145deg,#1a1a2e 0%,#0a0a0a 100%);box-shadow:0 15px 40px rgba(0,0,0,0.5)}.game-sidebar{display:grid;grid-template-columns:repeat(2,1fr);gap:20px;flex:1 1 45%;max-width:760px}.info-panel{background:linear-gradient(135deg,#FF1654 0%,#FF6B35 100%);padding:18px;border-radius:18px;color:white;box-shadow:0 8px 25px rgba(255,22,84,0.4)}.info-panel h3{font-size:20px;margin-bottom:12px;text-align:center}.stat-value{font-size:36px;text-align:center;font-weight:bold}.btn{padding:15px;font-size:16px;font-weight:bold;border:none;border-radius:12px;cursor:pointer;transition:all 0.3s}.btn-primary{background:linear-gradient(135deg,#FF1654 0%,#FF6B35 100%);color:white}.btn-secondary{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:white}.btn-group{display:flex;flex-wrap:wrap;gap:12px;grid-column:1/-1}.btn-group .btn{flex:1 1 calc(50% - 12px)}.controls-panel{background:rgba(255,255,255,0.05);padding:18px;border-radius:18px}.control-item{display:flex;justify-content:space-between;padding:10px;background:rgba(255,255,255,0.07);border-radius:10px;margin:10px 0}.span-2{grid-column:1/-1}input[type="range"]{width:100%;margin-top:10px}@media(max-width:1200px){.game-container{flex-direction:column}.btn-group .btn{flex:1 1 100%}}</style>
</head>
<body>
    <div class="game-container">
        <div class="game-main">
            <h1 class="game-title">🔴 Marble Chain</h1>
            <canvas id="gameCanvas" width="600" height="800"></canvas>
        </div>
        <div class="game-sidebar">
            <div class="info-panel"><h3>🎯 Score</h3><div class="stat-value" id="score">0</div></div>
            <div class="info-panel"><h3>⚡ Multiplier</h3><div class="stat-value" id="combo">1x</div></div>
            <div class="info-panel span-2"><h3>📊 Level</h3><div class="stat-value" id="level">1</div></div>
            <div class="info-panel span-2"><h3>⚡ Speed</h3><div style="display:flex;justify-content:space-between;padding:10px;background:rgba(255,255,255,0.15);border-radius:12px"><span>Speed:</span><span style="font-weight:bold" id="speedValue">1.0x</span></div><input type="range" id="speedSlider" min="0.5" max="2" step="0.1" value="1"></div>
            <div class="btn-group">
                <button class="btn btn-primary" id="startBtn">🎮 Start</button>
                <button class="btn btn-secondary" id="backBtn">🏠 Back</button>
                <button class="btn btn-secondary" id="fullscreenBtn">🖥️ Fullscreen</button>
            </div>
            <div class="controls-panel span-2"><h3>🎮 Controls</h3>
                <div class="control-item"><span>Aim</span><span style="background:linear-gradient(135deg,#FF1654 0%,#FF6B35 100%);color:white;padding:6px 12px;border-radius:8px">← →</span></div>
                <div class="control-item"><span>Shoot</span><span style="background:linear-gradient(135deg,#FF1654 0%,#FF6B35 100%);color:white;padding:6px 12px;border-radius:8px">Space</span></div>
            </div>
        </div>
    </div>
    <script src="../../engine/audioManager.js"></script>
    <script src="../../engine/inputHandler.js"></script>
    <script src="../../engine/saveManager.js"></script>
    <script src="game.js"></script>
</body>
</html>
